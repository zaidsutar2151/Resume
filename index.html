<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Zaid Sutar - Resume</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-user-tie"></i> Md Zaid Sutar</h1>
                <p>Professional Resume</p>
            </div>
            <div class="header-actions">
                <button id="downloadBtn" class="btn btn-primary">
                    <i class="fas fa-download"></i> Download PDF
                </button>
                <button id="fullscreenBtn" class="btn btn-secondary">
                    <i class="fas fa-expand"></i> Fullscreen
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="pdf-controls">
                <div class="page-controls">
                    <button id="prevPage" class="btn btn-icon">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span class="page-info">
                        Page <input type="number" id="pageNum" value="1" min="1"> of <span id="pageCount">0</span>
                    </span>
                    <button id="nextPage" class="btn btn-icon">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="zoom-controls">
                    <button id="zoomOut" class="btn btn-icon">
                        <i class="fas fa-search-minus"></i>
                    </button>
                    <span id="zoomLevel">100%</span>
                    <button id="zoomIn" class="btn btn-icon">
                        <i class="fas fa-search-plus"></i>
                    </button>
                    <button id="fitWidth" class="btn btn-icon">
                        <i class="fas fa-arrows-alt-h"></i>
                    </button>
                </div>
            </div>

            <div class="pdf-container" id="pdfContainer">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading resume...</p>
                </div>
                <canvas id="pdfCanvas"></canvas>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2024 Md Zaid Sutar. All rights reserved.</p>
                <div class="social-links">
                    <a href="#" class="social-link"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-link"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
